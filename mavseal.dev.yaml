server:
  # Address/Port that Signatory listens on
  address: :6732
  # Address/Port that Signatory serves prometheus metrics on
  utility_address: :9583

vaults:
  # Name of vault
  local_file_keys:
    driver: file
    config:
      file: /etc/secret.json

# List enabled public keys hashes here
mavryk:
  mv1AAFByPGTyFdbshgfA8ogjgf7pQKuR7ATp: # Oracle 1
    log_payloads: true
    # `allow` maps each permitted request type to the operation kinds it may
    # contain (mavseal >= 1.2.0). Request types: [block, endorsement,
    # preendorsement, generic, failing_noop]. The oracle only needs generic
    # transactions to push prices, plus failing_noop for proof-of-key signing.
    allow:
      generic:
        - transaction
      failing_noop:

  # Default policy allows "block" and "endorsement" operations
