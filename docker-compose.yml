services:
  db:
    image: timescale/timescaledb:latest-pg15
    shm_size: 1g
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=bcd
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db:/var/lib/postgresql/data
    logging: &bcd-logging
      options:
        max-size: 10m
        max-file: '5'
    networks:
      p2p:

  api:
    restart: always
    image: ghcr.io/mavryk-network/bcdhub-api:4.7.9
    environment:
      - BCD_ENV=sandbox
      - GIN_MODE=debug
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - SANDBOX_NODE_URI=http://sandbox:20000
      - SANDBOX_IPFS_GATEWAY=https://cloudflare-ipfs.com
    depends_on:
      - db
    ports:
      - 127.0.0.1:14000:14000
    volumes:
      - bcdshare:/etc/bcd
    links:
      - 'flexmasa:sandbox'
    expose:
      - 14000/tcp
    logging: *bcd-logging
    networks:
      p2p:

  indexer:
    restart: always
    image: ghcr.io/mavryk-network/bcdhub-indexer:4.7.9
    environment:
      - BCD_ENV=sandbox
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - SANDBOX_NODE_URI=http://sandbox:20000
      - SANDBOX_IPFS_GATEWAY=https://cloudflare-ipfs.com
    depends_on:
      - db
    links:
      - 'flexmasa:sandbox'
    volumes:
      - bcdshare:/etc/bcd
    logging: *bcd-logging
    networks:
      p2p:

  flexmasa:
