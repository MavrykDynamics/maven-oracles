version: '3.7'

volumes:
  esdata:
  bcdshare:
  db:
    driver: local

services:
  #  builder:
  #    container_name: builder
  #    working_dir: /
  #    build:
  #      dockerfile: images/node.dev.Dockerfile
  #      context: .
  #    command:
  #      - "sleep"
  #      - "3600"
  #      # - "/home/node/common/scripts/install-run-rush.js"
  #      # - "build:watch"
  #    volumes:
  #      - './apps:/home/node/apps'
  #      - './libs:/home/node/libs'

  elastic:
    image: ghcr.io/baking-bad/bcdhub-elastic:master
    restart: always
    volumes:
      - esdata:/usr/share/elasticsearch/data
    environment:
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - 'ES_JAVA_OPTS=-Xms256m -Xmx256m'
    logging: &bcd-logging
      options:
        max-size: 10m
        max-file: '5'
    networks:
      p2p:

  db:
    image: postgres:12
    shm_size: 1g
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=bcd
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db:/var/lib/postgresql/data
    logging: *bcd-logging
    networks:
      p2p:

  api:
    restart: always
    image: ghcr.io/baking-bad/bcdhub-api:master
    environment:
      - BCD_ENV=sandbox
      - GIN_MODE=debug
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - SANDBOX_NODE_URI=http://sandbox:20000
      - SANDBOX_IPFS_GATEWAY=https://cloudflare-ipfs.com
    depends_on:
      - elastic
      - db
    ports:
      - 14000:14000
    volumes:
      - bcdshare:/etc/bcd
    links:
      - 'flextesa:sandbox'
    logging: *bcd-logging
    networks:
      p2p:

  indexer:
    restart: always
    image: ghcr.io/baking-bad/bcdhub-indexer:master
    environment:
      - BCD_ENV=sandbox
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - SANDBOX_NODE_URI=http://sandbox:20000
      - SANDBOX_IPFS_GATEWAY=https://cloudflare-ipfs.com
    depends_on:
      - db
      - metrics
    links:
      - 'flextesa:sandbox'
    volumes:
      - bcdshare:/etc/bcd
    logging: *bcd-logging
    networks:
      p2p:

  metrics:
    restart: always
    image: ghcr.io/baking-bad/bcdhub-metrics:master
    environment:
      - BCD_ENV=sandbox
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - SANDBOX_NODE_URI=http://sandbox:20000
      - SANDBOX_IPFS_GATEWAY=https://cloudflare-ipfs.com
    depends_on:
      - elastic
      - db
    links:
      - 'flextesa:sandbox'
    volumes:
      - bcdshare:/etc/bcd
    logging: *bcd-logging
    networks:
      p2p:

