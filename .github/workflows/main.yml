name: Pre-Release
on:
  push:
    branches:
      - main
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - main
      - maven-migration

jobs:
  tests:
    name: Unit test (Node ${{ matrix.node }}, ${{ matrix.architecture }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['14', '16']
        architecture: ['x64']
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.architecture }}

      - run: node common/scripts/install-run-rush.js install

      - run: node common/scripts/install-run-rush.js build

      - run: node common/scripts/install-run-rush.js test -v

      - run: cat ./libs/oracle/temp/coverage/clover.xml

      - uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          files: ./libs/oracle/temp/coverage/clover.xml # optional
          fail_ci_if_error: true # optional (default = false)
          verbose: true # optional (default = false)

  build-docker-image:
    needs: tests
    name: Build base image
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
      DOCKER_REGISTRY: ghcr.io
      DOCKER_IMAGE_BASE: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Log in to the registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Oracle image tags & labels
        id: meta-oracle
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASE }}

      - name: Oracle image build & push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: images/node.Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta-oracle.outputs.tags }}
          labels: ${{ steps.meta-oracle.outputs.labels }}
          platforms: linux/amd64,linux/arm/v7,linux/arm/v6

      - name: Bootstrap image tags & labels
        id: meta-bootstrap
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASE }}-bootstrap

      - name: Bootstrap image build & push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: images/bootstrap-node.Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta-bootstrap.outputs.tags }}
          labels: ${{ steps.meta-bootstrap.outputs.labels }}
          platforms: linux/amd64,linux/arm/v7,linux/arm/v6
